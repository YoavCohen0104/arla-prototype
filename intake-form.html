<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Intake — Arla Aesthetics</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .duplicate-warning {
      display: none;
      background: #fdf6e3;
      border: 1.5px solid #d4a843;
      border-radius: 7px;
      padding: 12px 14px;
      margin-top: 8px;
      font-size: 14px;
      color: var(--color-text);
      line-height: 1.5;
    }
    .duplicate-warning.visible { display: block; }
    .dup-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .btn-warn-open {
      background: #d4a843;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-weight: 500;
    }
    .btn-warn-open:hover { background: #bb9034; }
    .btn-warn-dismiss {
      background: transparent;
      color: var(--color-text-muted);
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-warn-dismiss:hover { border-color: var(--color-text-muted); color: var(--color-text); }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Arla Aesthetics</p>
    <h1>Patient Intake</h1>


    <form id="intake-form" novalidate>

      <div class="field">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="e.g. Sarah Mitchell"
          autocomplete="name"
        />
        <span class="error-msg" id="name-error"></span>
      </div>

      <div class="field">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="e.g. +1 212 555 0190"
          autocomplete="tel"
        />
        <span class="error-msg" id="phone-error"></span>
        <div class="duplicate-warning" id="phone-duplicate">
          <p>A patient with this number already exists: <strong class="dup-name"></strong>. Open their folder instead?</p>
          <div class="dup-actions">
            <a href="patient-folder.html" class="btn-warn-open">Open Patient</a>
            <button type="button" class="btn-warn-dismiss" id="dup-continue">Continue Anyway</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="dob">Date of Birth</label>
        <input
          type="date"
          id="dob"
          name="dob"
          autocomplete="bday"
        />
        <span class="error-msg" id="dob-error"></span>
      </div>

      <div class="field">
        <label for="gender">Gender</label>
        <select id="gender" name="gender">
          <option value="">Select…</option>
          <option value="Female">Female</option>
          <option value="Male">Male</option>
          <option value="Non-binary">Non-binary</option>
          <option value="Prefer not to say">Prefer not to say</option>
        </select>
        <span class="error-msg" id="gender-error"></span>
      </div>

      <div class="field">
        <label for="complaint">Chief Complaint</label>
        <textarea
          id="complaint"
          name="complaint"
          placeholder="Describe the patient's primary concern or reason for visit…"
        ></textarea>
        <span class="error-msg" id="complaint-error"></span>
      </div>

      <button type="submit" class="btn btn-primary">Review &amp; Confirm</button>

    </form>
  </div>

  <script src="intake.js"></script>
</body>
</html>
