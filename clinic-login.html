<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Login — Arla Aesthetics</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--color-text-muted);
    }

    .login-footer a {
      color: var(--color-rose);
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--color-text-muted);
      cursor: pointer;
    }

    .remember-label input[type="checkbox"] {
      width: 15px;
      height: 15px;
      border: 1.5px solid var(--color-border);
      border-radius: 3px;
      background: var(--color-bg);
      cursor: pointer;
      flex-shrink: 0;
      /* reset shared input styles */
      padding: 0;
      appearance: auto;
      -webkit-appearance: auto;
    }

    /* layout-only — visual style comes from .btn-secondary */
    .btn-biometric {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.04em;
    }

    .role-selector {
      display: flex;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .role-selector input[type="radio"] {
      display: none;
    }

    .role-selector label {
      flex: 1;
      text-align: center;
      padding: 9px 4px;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: 0.04em;
      color: var(--color-text-muted);
      cursor: pointer;
      border-right: 1.5px solid var(--color-border);
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }

    .role-selector label:last-of-type {
      border-right: none;
    }

    .role-selector input[type="radio"]:checked + label {
      background: var(--color-rose);
      color: #fff;
      font-weight: 500;
    }

    .role-label-heading {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Arla Aesthetics</p>
    <h1>Clinic Login</h1>

    <form id="login-form" novalidate>

      <p class="role-label-heading">Sign in as</p>
      <div class="role-selector" role="group" aria-label="Select role">
        <input type="radio" id="role-injector" name="role" value="injector" checked />
        <label for="role-injector">Injector</label>
        <input type="radio" id="role-assistant" name="role" value="assistant" />
        <label for="role-assistant">Assistant</label>
        <input type="radio" id="role-expert" name="role" value="expert" />
        <label for="role-expert">Expert</label>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="e.g. dr.smith@clinic.com"
          autocomplete="email"
        />
        <span class="error-msg" id="email-error"></span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <span class="error-msg" id="password-error"></span>
      </div>

      <button type="submit" class="btn btn-primary">Sign In</button>

      <label class="remember-label">
        <input type="checkbox" id="remember-device" name="remember-device" />
        Remember this device
      </label>

    </form>

    <div class="or-divider"><span>or</span></div>

    <button type="button" id="biometric-btn" class="btn btn-secondary btn-biometric">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10"/>
        <path d="M5 19.5A7 7 0 0 1 5 12a7 7 0 0 1 14 0"/>
        <path d="M8.5 19A4.5 4.5 0 0 1 8 12a4 4 0 0 1 8 0c0 2.5-.5 4.5-1.5 6"/>
        <path d="M11 21a14 14 0 0 0 1-9 2 2 0 0 0-4 0"/>
        <path d="M13 21a14 14 0 0 1-1-9"/>
      </svg>
      Sign in with Biometric
    </button>

    <p class="login-footer">
      <a href="#">Forgot your password?</a>
    </p>
  </div>

  <script>
    const form = document.getElementById('login-form');

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');

    function validateEmail(value) {
      if (!value.trim()) return 'Email is required.';
      // Basic RFC-compliant email pattern check
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return 'Enter a valid email address.';
      return '';
    }

    function validatePassword(value) {
      if (!value) return 'Password is required.';
      if (value.length < 6) return 'Password must be at least 6 characters.';
      return '';
    }

    function showError(input, errorEl, message) {
      if (message) {
        input.classList.add('invalid');
        errorEl.textContent = message;
        errorEl.classList.add('visible');
      } else {
        input.classList.remove('invalid');
        errorEl.textContent = '';
        errorEl.classList.remove('visible');
      }
    }

    // Clear errors on input so feedback feels immediate
    emailInput.addEventListener('input', () => {
      showError(emailInput, emailError, validateEmail(emailInput.value));
    });

    passwordInput.addEventListener('input', () => {
      showError(passwordInput, passwordError, validatePassword(passwordInput.value));
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const emailMsg = validateEmail(emailInput.value);
      const passwordMsg = validatePassword(passwordInput.value);

      showError(emailInput, emailError, emailMsg);
      showError(passwordInput, passwordError, passwordMsg);

      if (emailMsg || passwordMsg) return;

      const role = form.querySelector('input[name="role"]:checked').value;
      localStorage.setItem('arla_role', role);

      // Route based on role — experts go to their dashboard, everyone else to home
      if (role === 'expert') {
        window.location.href = 'expert-dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    });

    const biometricBtn = document.getElementById('biometric-btn');

    biometricBtn.addEventListener('click', async () => {
      // WebAuthn is the standard for platform biometrics (Face ID, Touch ID, Windows Hello)
      if (!window.PublicKeyCredential) {
        alert('Biometric authentication is not supported on this browser or device.');
        return;
      }

      try {
        const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (!available) {
          alert('No biometric authenticator found on this device.');
          return;
        }

        // Placeholder — replace with real WebAuthn assertion flow:
        // 1. Fetch a challenge from the server
        // 2. Call navigator.credentials.get({ publicKey: { challenge, rpId, userVerification: 'required', allowCredentials: [...] } })
        // 3. Send the credential response to the server for verification
        const role = form.querySelector('input[name="role"]:checked').value;
        localStorage.setItem('arla_role', role);
        if (role === 'expert') {
          window.location.href = 'expert-dashboard.html';
        } else {
          window.location.href = 'index.html';
        }
      } catch (err) {
        alert('Biometric authentication failed: ' + err.message);
      }
    });
  </script>
</body>
</html>
