<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facial Capture — Arla Aesthetics</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .capture-frame {
      width: 100%;
      aspect-ratio: 3 / 4;
      max-height: 340px;
      background: #1a1a1a;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
      position: relative;
    }

    .capture-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* mirror so it feels like a selfie camera */
      transform: scaleX(-1);
      display: block;
    }

    .cam-error {
      font-size: 13px;
      color: var(--color-text-muted);
      text-align: center;
      padding: 0 24px;
      line-height: 1.6;
    }

    .expr-name {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      font-weight: normal;
      text-align: center;
      margin: 12px 0 4px;
      color: var(--color-text);
    }

    .expr-instruction {
      font-size: 14px;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: 20px;
    }

    .cancel-link {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
    }

    .cancel-link a {
      color: var(--color-text-muted);
      text-decoration: none;
    }

    .cancel-link a:hover {
      color: var(--color-rose);
      text-decoration: underline;
    }

    /* ── Player control bar ── */

    .ctrl-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      margin: 16px 0 6px;
      min-height: 72px;
    }

    .ctrl-slot {
      display: flex;
      align-items: center;
    }
    .ctrl-left  { justify-content: flex-start; }
    .ctrl-center { justify-content: center; }
    .ctrl-right { justify-content: flex-end; }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, opacity 0.15s;
      flex-shrink: 0;
    }
    /* Author display: flex overrides UA [hidden] display: none — restore it */
    .ctrl-btn[hidden] { display: none; }
    .ctrl-btn:active { transform: scale(0.94); }

    /* Large center button — Capture / Resume */
    .ctrl-main {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--color-rose);
      color: #fff;
    }
    .ctrl-main:hover { background: #a0666c; }

    /* Small side buttons — Cancel / Pause */
    .ctrl-side {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid var(--color-rose);
      color: var(--color-rose);
    }
    .ctrl-side:hover { background: var(--color-rose-pale); }

    .btn-danger {
      background: var(--color-error);
      color: #fff;
      border: none;
      width: auto;
      padding: 11px 24px;
      border-radius: var(--radius);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.18s;
    }
    .btn-danger:hover { background: #a93226; }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(58, 40, 40, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .dialog-backdrop[hidden] { display: none; }

    .dialog-box {
      background: var(--color-card);
      border-radius: var(--radius);
      padding: 28px 24px 24px;
      max-width: 320px;
      width: 90%;
      box-shadow: var(--shadow);
    }

    .dialog-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      font-weight: normal;
      color: var(--color-text);
      margin: 0 0 10px;
    }

    .dialog-body {
      font-size: 14px;
      color: var(--color-text-muted);
      margin: 0 0 22px;
      line-height: 1.5;
    }

    .dialog-box .action-row .btn {
      width: auto;
    }
  </style>
</head>
<body>
  <!-- ── Capture screen (steps 1–7) ── -->
  <div class="card" id="capture-screen">
    <p class="brand">Arla Aesthetics</p>
    <h1>Facial Capture</h1>

    <div class="step-indicator">
      <span class="step-label" id="step-label">Expression 1 of 7</span>
      <div class="step-bar">
        <div class="step-bar-fill" id="step-bar-fill" style="width: 0%"></div>
      </div>
    </div>

    <h2 class="expr-name" id="expr-name"></h2>
    <p class="expr-instruction" id="expr-instruction"></p>

    <div class="capture-frame">
      <video id="capture-video" class="capture-video" autoplay playsinline muted></video>
      <p class="cam-error" id="cam-error" hidden>
        Camera access was denied or is unavailable.<br />
        Grant camera permission and reload to continue.
      </p>
    </div>

    <!-- Canvas is never displayed; used only to snapshot the video frame -->
    <canvas id="snap-canvas" hidden></canvas>

    <!-- Player-style control bar -->
    <div class="ctrl-bar">
      <div class="ctrl-slot ctrl-left">
        <!-- Cancel: appears after first capture -->
        <button id="cancel-btn" class="ctrl-btn ctrl-side" hidden aria-label="Cancel">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="ctrl-slot ctrl-center">
        <!-- Capture: visible on load; hidden while paused -->
        <button id="capture-btn" class="ctrl-btn ctrl-main" aria-label="Capture">
          <svg width="22" height="22" viewBox="0 0 22 22">
            <circle cx="11" cy="11" r="8" fill="white" opacity="0.9"/>
          </svg>
        </button>
        <!-- Resume: hidden until paused -->
        <button id="resume-btn" class="ctrl-btn ctrl-main" hidden aria-label="Resume">
          <svg width="18" height="20" viewBox="0 0 18 20">
            <polygon points="3,1 17,10 3,19" fill="white"/>
          </svg>
        </button>
      </div>
      <div class="ctrl-slot ctrl-right">
        <!-- Pause: appears after first capture; hidden while paused -->
        <button id="pause-btn" class="ctrl-btn ctrl-side" hidden aria-label="Pause">
          <svg width="14" height="16" viewBox="0 0 14 16">
            <rect x="1" y="1" width="4" height="14" rx="1.5" fill="currentColor"/>
            <rect x="9" y="1" width="4" height="14" rx="1.5" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Cancel confirmation dialog -->
  <div id="cancel-dialog" class="dialog-backdrop" hidden>
    <div class="dialog-box">
      <h2 class="dialog-title">Discard this scan session?</h2>
      <p class="dialog-body"></p>
      <div class="action-row">
        <button id="dialog-continue-btn" class="btn btn-secondary">Continue Scanning</button>
        <button id="dialog-discard-btn" class="btn btn-danger">Discard</button>
      </div>
    </div>
  </div>

  <script>
    const EXPRESSIONS = [
      { name: 'Neutral / Serious',     instruction: 'Relax your face completely. Look straight into the camera.' },
      { name: 'Raised Eyebrows',       instruction: 'Raise both eyebrows as high as possible, as if surprised.' },
      { name: 'Frown',                 instruction: 'Furrow your brows and frown, drawing your eyebrows together.' },
      { name: 'Smile',                 instruction: 'Give a natural, open-mouth smile.' },
      { name: 'Sad',                   instruction: 'Lower the corners of your mouth and look sad.' },
      { name: 'Left Side View (90°)',  instruction: 'Turn your head 90° to the left to show your full left profile.' },
      { name: 'Right Side View (90°)', instruction: 'Turn your head 90° to the right to show your full right profile.' },
    ];

    const TOTAL = EXPRESSIONS.length;

    const captureScreen  = document.getElementById('capture-screen');
    const stepLabel      = document.getElementById('step-label');
    const stepBarFill    = document.getElementById('step-bar-fill');
    const exprName       = document.getElementById('expr-name');
    const exprInstruct   = document.getElementById('expr-instruction');
    const video          = document.getElementById('capture-video');
    const camError       = document.getElementById('cam-error');
    const canvas         = document.getElementById('snap-canvas');
    const captureBtn     = document.getElementById('capture-btn');
    const pauseBtn       = document.getElementById('pause-btn');
    const cancelBtn      = document.getElementById('cancel-btn');
    const resumeBtn      = document.getElementById('resume-btn');
    const cancelDialog   = document.getElementById('cancel-dialog');
    const dialogBody     = cancelDialog.querySelector('.dialog-body');
    const dialogContinue = document.getElementById('dialog-continue-btn');
    const dialogDiscard  = document.getElementById('dialog-discard-btn');

    let snapshots = [];
    let stream = null;
    let recorder = null;
    const recordedChunks = [];
    let isPaused = false;

    // ── Retake mode detection ──
    const retakeRaw   = sessionStorage.getItem('arla_retake_index');
    const retakeMode  = retakeRaw !== null;
    const retakeIndex = retakeMode ? parseInt(retakeRaw, 10) : -1;

    // ── Guard: require session data ──
    // Accept a fresh intake submission, a returning patient, or a single-expression retake.
    const sessionRaw         = sessionStorage.getItem('arla_intake');
    const selectedPatientRaw = sessionStorage.getItem('arla_selected_patient');

    if (!sessionRaw && !selectedPatientRaw && !retakeMode) {
      window.location.href = 'intake-form.html';
    }

    // In retake mode arla_intake was already cleared; patient info lives in arla_capture.
    const intakeData  = retakeMode
      ? JSON.parse(sessionStorage.getItem('arla_capture') || '{}')
      : JSON.parse(sessionRaw || selectedPatientRaw || '{}');
    const patientName = intakeData.patientName || intakeData.name || 'Unknown patient';

    // Seed snapshots from existing capture so the retake only replaces one slot.
    if (retakeMode) {
      const existing = JSON.parse(sessionStorage.getItem('arla_capture') || '{}');
      snapshots = Array.isArray(existing.snapshots) ? [...existing.snapshots] : [];
    }

    let currentStep = retakeMode ? retakeIndex : 0;

    // ── Camera init ──
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } },
        });
        video.srcObject = stream;
      } catch {
        video.hidden = true;
        camError.hidden = false;
        captureBtn.disabled = true;
        captureBtn.style.opacity = '0.4';
      }
    }

    // ── MediaRecorder: start on first expression of a full session ──
    function startRecording() {
      if (!window.MediaRecorder || !stream) return;
      try {
        const mimeType = [
          'video/webm;codecs=vp9',
          'video/webm;codecs=vp8',
          'video/webm',
          'video/mp4',
        ].find(t => MediaRecorder.isTypeSupported(t)) || '';

        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});

        recorder.ondataavailable = e => {
          if (e.data && e.data.size > 0) recordedChunks.push(e.data);
        };

        // onstop fires asynchronously; build the blob URL here and pass it to finishCapture.
        recorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: recorder.mimeType || 'video/webm' });
          finishCapture(URL.createObjectURL(blob));
        };

        recorder.start();
      } catch {
        // Recording unavailable — finishCapture will be called without a video URL.
      }
    }

    // ── Save capture data and navigate to scan review ──
    function finishCapture(videoUrl = '') {
      sessionStorage.setItem('arla_capture', JSON.stringify({
        snapshots,
        videoUrl,
        patientName: intakeData.name      || intakeData.patientName || '',
        complaint:   intakeData.complaint || '',
        phone:       intakeData.phone     || '',
        dob:         intakeData.dob       || '',
        gender:      intakeData.gender    || '',
        submittedAt: new Date().toISOString(),
      }));
      sessionStorage.setItem('arla_scan_mode', 'submit');
      sessionStorage.removeItem('arla_intake');
      window.location.href = 'scan-review.html';
    }

    // ── Render step ──
    function renderStep(index) {
      const expr = EXPRESSIONS[index];
      stepLabel.textContent    = `Expression ${index + 1} of ${TOTAL}`;
      stepBarFill.style.width  = `${(index / TOTAL) * 100}%`;
      exprName.textContent     = expr.name;
      exprInstruct.textContent = expr.instruction;
    }

    // ── Pause / Resume / Cancel ──

    pauseBtn.addEventListener('click', () => {
      isPaused = true;
      if (recorder && recorder.state === 'recording') recorder.pause();
      captureBtn.hidden = true;
      pauseBtn.hidden   = true;
      resumeBtn.hidden  = false;
    });

    resumeBtn.addEventListener('click', () => {
      isPaused = false;
      if (recorder && recorder.state === 'paused') recorder.resume();
      resumeBtn.hidden  = true;
      captureBtn.hidden = false;
      pauseBtn.hidden   = false;
      renderStep(currentStep);
    });

    cancelBtn.addEventListener('click', () => {
      dialogBody.textContent = retakeMode
        ? 'Discard this retake? The original capture will be kept.'
        : `${currentStep} of ${TOTAL} expressions have been captured. All progress will be lost.`;
      cancelDialog.hidden = false;
    });

    dialogContinue.addEventListener('click', () => {
      cancelDialog.hidden = true;
    });

    dialogDiscard.addEventListener('click', () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (retakeMode) {
        sessionStorage.removeItem('arla_retake_index');
        window.location.href = 'scan-review.html';
      } else {
        sessionStorage.removeItem('arla_intake');
        window.location.href = 'index.html';
      }
    });

    // ── Capture click ──
    captureBtn.addEventListener('click', () => {
      // Start full-session recording on the very first capture (not during retakes).
      if (currentStep === 0 && !retakeMode) {
        startRecording();
        cancelBtn.hidden = false;
        pauseBtn.hidden  = false;
      }

      // Snapshot: draw current video frame onto hidden canvas
      const vw = video.videoWidth  || 640;
      const vh = video.videoHeight || 480;
      canvas.width  = vw;
      canvas.height = vh;
      const ctx = canvas.getContext('2d');
      // Mirror the canvas draw to match the display
      ctx.translate(vw, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, vw, vh);

      const dataURL = canvas.toDataURL('image/jpeg', 0.85);
      // Index assignment works for both normal (sequential) and retake (single slot) flows.
      snapshots[currentStep] = dataURL;

      currentStep++;

      if (retakeMode) {
        // Retake complete — write the updated snapshot back into arla_capture and return.
        const existing = JSON.parse(sessionStorage.getItem('arla_capture') || '{}');
        existing.snapshots = snapshots;
        sessionStorage.setItem('arla_capture', JSON.stringify(existing));
        sessionStorage.removeItem('arla_retake_index');
        if (stream) stream.getTracks().forEach(t => t.stop());
        window.location.href = 'scan-review.html';
      } else if (currentStep < TOTAL) {
        renderStep(currentStep);
        stepBarFill.style.width = `${(currentStep / TOTAL) * 100}%`;
      } else {
        // All expressions captured — stop recorder (onstop calls finishCapture) or finish directly.
        if (recorder && recorder.state !== 'inactive') {
          recorder.stop();
        } else {
          finishCapture('');
        }
      }
    });

    // ── Init ──
    renderStep(currentStep);
    startCamera();
    // Show cancel button immediately in retake mode so the user can abort before capturing.
    if (retakeMode) cancelBtn.hidden = false;
  </script>
</body>
</html>
