<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treatment Plan — Arla Aesthetics</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Compact header ── */
    .plan-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }
    .plan-patient {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text);
    }
    .plan-id {
      font-size: 13px;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .plan-complaint {
      font-size: 14px;
      color: var(--color-text-muted);
      margin: 0 0 4px;
    }
    .plan-attribution {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 20px;
    }

    /* ── Section headings ── */
    .section-heading {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
      margin: 0 0 8px;
    }

    /* ── Awaiting state ── */
    .awaiting-box {
      background: var(--color-rose-pale);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 32px 16px;
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.95rem;
      margin: 8px 0 24px;
    }

    /* ── Expression thumbnails ── */
    .thumb-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      scroll-snap-type: x mandatory;
      margin-bottom: 16px;
    }
    .thumb-row::-webkit-scrollbar { height: 4px; }
    .thumb-row::-webkit-scrollbar-thumb {
      background: var(--color-rose-light);
      border-radius: 2px;
    }
    .thumb-item {
      flex-shrink: 0;
      scroll-snap-align: start;
      cursor: pointer;
      border-radius: 6px;
      border: 2px solid transparent;
      overflow: hidden;
      width: 76px;
      background: var(--color-rose-pale);
      transition: border-color 0.15s;
    }
    .thumb-item.active { border-color: var(--color-rose); }
    .thumb-item img {
      width: 100%;
      height: 60px;
      object-fit: cover;
      display: block;
    }
    .thumb-label {
      display: block;
      text-align: center;
      font-size: 0.6rem;
      color: var(--color-text-muted);
      padding: 3px 2px 4px;
      line-height: 1.2;
    }
    .thumb-placeholder {
      width: 100%;
      height: 60px;
      background: var(--color-rose-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--color-text-muted);
    }

    /* ── Annotated image (read-only) ── */
    .annotation-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      max-height: 480px;
      background: var(--color-background-secondary, #f5f0f0);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 6px;
    }
    #annotation-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .img-unavailable {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6a4040;
      font-size: 0.85rem;
    }
    #dot-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .ann-dot {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font: bold 10px/1 sans-serif;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }
    .ann-dot.superficial { background: var(--color-rose); }
    .ann-dot.deep        { background: #6b9ac4; }
    .ann-dot.highlighted {
      box-shadow: 0 0 0 5px rgba(255,255,255,0.55), 0 0 0 8px rgba(0,0,0,0.15);
    }

    /* ── Injection points list (read-only) ── */
    .ann-list-section { margin-top: 20px; }
    #ann-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ann-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .ann-item:hover { border-color: var(--color-rose-light); }
    .ann-item.active { border-color: var(--color-rose); background: var(--color-rose-pale); }
    .ann-item-dot {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font: bold 11px/1 sans-serif;
      color: #fff;
      margin-top: 1px;
    }
    .ann-item-dot.superficial { background: var(--color-rose); }
    .ann-item-dot.deep        { background: #6b9ac4; }
    .ann-item-body { flex: 1; min-width: 0; }
    .ann-item-depth {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 0 2px;
    }
    .ann-item-depth.superficial { color: var(--color-rose); }
    .ann-item-depth.deep        { color: #6b9ac4; }
    .ann-item-expr {
      font-size: 0.72rem;
      color: var(--color-text-muted);
      margin: 0 0 2px;
      font-style: italic;
    }
    .ann-item-dosage {
      font-size: 0.82rem;
      color: var(--color-text);
      margin: 0 0 2px;
    }
    .ann-item-note {
      font-size: 0.82rem;
      color: var(--color-text-muted);
      font-style: italic;
      margin: 0;
    }
    .ann-empty {
      color: var(--color-text-muted);
      font-size: 0.85rem;
      font-style: italic;
      text-align: center;
      padding: 12px 0;
    }

    /* ── Expert notes box ── */
    .notes-section { margin-top: 20px; }
    .notes-box {
      background: var(--color-rose-pale);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .notes-box p {
      font-size: 0.875rem;
      color: var(--color-text);
      line-height: 1.6;
      margin: 0 0 6px;
    }
    .notes-box p:last-child { margin-bottom: 0; }
    .notes-point-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <div class="page-stack">
  <nav class="proto-nav">
    <a href="index.html">Injector View</a>
    <a href="expert-dashboard.html">Expert View</a>
    <a href="expert-annotation.html">Annotation</a>
    <a href="case-submitted.html">Case Submitted</a>
    <a href="treatment-plan.html" class="active">Treatment Plan</a>
    <a href="feedback.html">Feedback</a>
  </nav>
  <div class="card">
    <p class="brand">Arla Aesthetics</p>

    <div class="plan-header">
      <span class="plan-patient" id="patient-name">—</span>
      <span class="plan-id" id="plan-id"></span>
    </div>
    <p class="plan-complaint" id="chief-complaint"></p>
    <p class="plan-attribution" id="plan-attribution"></p>

    <!-- Shown when no annotation data available -->
    <div class="awaiting-box" id="awaiting-box" hidden>
      Awaiting expert treatment plan
    </div>

    <!-- Plan content — populated from sessionStorage -->
    <div id="plan-content" hidden>

      <!-- Expression thumbnails: clicking switches the base annotation image -->
      <p class="section-heading">Expressions</p>
      <div class="thumb-row" id="thumb-row"></div>

      <!-- Read-only annotated image with numbered, color-coded dots -->
      <p class="section-heading">Injection Map</p>
      <div class="annotation-wrap" id="annotation-wrap">
        <img id="annotation-img" alt="Clinical expression photo" />
        <div id="dot-overlay"></div>
      </div>

      <!-- Injection points list — same format as expert-annotation, read-only -->
      <div class="ann-list-section">
        <p class="section-heading">Point Details</p>
        <ol id="ann-list"></ol>
      </div>

      <!-- Expert notes: consolidated note text from any dots that have notes -->
      <div class="notes-section" id="notes-section" hidden>
        <p class="section-heading">Expert Notes</p>
        <div class="notes-box" id="notes-box"></div>
      </div>

    </div><!-- /#plan-content -->

    <div class="action-row" style="margin-top: 28px;">
      <a href="case-submitted.html" class="btn btn-secondary" style="text-decoration: none;">← Back</a>
      <a href="feedback.html" class="btn btn-primary" style="width: auto; text-decoration: none;">Provide Feedback →</a>
    </div>
  </div>
  </div>

  <script>
    const EXPRESSIONS = [
      'Neutral / Serious',
      'Raised Eyebrows',
      'Frown',
      'Smile',
      'Sad',
      'Left Side (90°)',
      'Right Side (90°)',
    ];

    // ── Load session data ──
    const capture    = JSON.parse(sessionStorage.getItem('arla_capture')    || 'null');
    const annotation = JSON.parse(sessionStorage.getItem('arla_annotation') || 'null');

    const snapshots = capture?.snapshots ?? [];
    const dots      = annotation?.dots   ?? [];

    // ── Patient header ──
    document.getElementById('patient-name').textContent =
      capture?.patientName || 'Patient';
    document.getElementById('chief-complaint').textContent =
      capture?.complaint || '';
    // Static case ID placeholder — no backend yet
    document.getElementById('plan-id').textContent = 'ARL-2026-0042';

    if (annotation?.submittedAt) {
      const d = new Date(annotation.submittedAt);
      document.getElementById('plan-attribution').textContent =
        'Plan submitted ' + d.toLocaleString();
    }

    // ── Mutable UI state — declared before any function that reads them ──
    let activeThumbIndex = 0;
    let highlightedDotId = null;

    // ── Show awaiting or plan content ──
    if (!annotation) {
      document.getElementById('awaiting-box').hidden = false;
    } else {
      document.getElementById('plan-content').hidden = false;
      buildThumbs();
      selectThumb(0);
      renderList();
      buildNotes();
    }

    // ── Thumbnails ──

    function buildThumbs() {
      const row = document.getElementById('thumb-row');
      EXPRESSIONS.forEach((name, i) => {
        const item = document.createElement('div');
        item.className = 'thumb-item';

        if (snapshots[i]) {
          const img = document.createElement('img');
          img.src = snapshots[i];
          img.alt = name;
          item.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'thumb-placeholder';
          ph.textContent = String(i + 1);
          item.appendChild(ph);
        }

        const lbl = document.createElement('span');
        lbl.className = 'thumb-label';
        lbl.textContent = name;
        item.appendChild(lbl);

        item.addEventListener('click', () => { highlightedDotId = null; selectThumb(i); });
        row.appendChild(item);
      });
    }

    function selectThumb(index) {
      activeThumbIndex = index;
      document.querySelectorAll('#thumb-row .thumb-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      const img = document.getElementById('annotation-img');
      const wrap = document.getElementById('annotation-wrap');
      if (snapshots[index]) {
        img.onerror = () => console.error(`Failed to load snapshot[${index}]:`, snapshots[index].slice(0, 80));
        img.src = snapshots[index];
        img.style.display = 'block';
        wrap.querySelector('.img-unavailable')?.remove();
      } else {
        img.style.display = 'none';
        if (!wrap.querySelector('.img-unavailable')) {
          const ph = document.createElement('div');
          ph.className = 'img-unavailable';
          ph.textContent = 'No image captured for this expression';
          wrap.appendChild(ph);
        }
      }

      renderDots();
    }

    // ── Render dots for the currently displayed expression ──
    function renderDots() {
      const overlay = document.getElementById('dot-overlay');
      overlay.innerHTML = '';
      dots
        .filter(d => d.expressionIndex === activeThumbIndex)
        .forEach(dot => {
          const el = document.createElement('div');
          const depthClass = dot.depth === 'Deep' ? 'deep' : 'superficial';
          const hlClass    = dot.id === highlightedDotId ? ' highlighted' : '';
          el.className = `ann-dot ${depthClass}${hlClass}`;
          el.style.left = dot.x + '%';
          el.style.top  = dot.y + '%';
          el.textContent = dot.id;
          el.title = `Point ${dot.id}: ${dot.depth}${dot.dosage ? ' · ' + dot.dosage : ''}`;
          overlay.appendChild(el);
        });
    }

    // ── Injection points list ──
    function renderList() {
      const list = document.getElementById('ann-list');
      if (dots.length === 0) {
        list.innerHTML = '<li class="ann-empty">No injection points recorded.</li>';
        return;
      }
      dots.forEach(dot => {
        const li = document.createElement('li');
        li.className = 'ann-item';

        // Clicking a list item jumps to that expression and highlights the dot
        li.addEventListener('click', () => {
          highlightedDotId = dot.id;
          selectThumb(dot.expressionIndex);
          document.querySelectorAll('#ann-list .ann-item').forEach(el =>
            el.classList.toggle('active', el === li));
        });

        const dotEl = document.createElement('div');
        dotEl.className = `ann-item-dot ${dot.depth === 'Deep' ? 'deep' : 'superficial'}`;
        dotEl.textContent = dot.id;

        const body = document.createElement('div');
        body.className = 'ann-item-body';

        const depthEl = document.createElement('p');
        depthEl.className = `ann-item-depth ${dot.depth === 'Deep' ? 'deep' : 'superficial'}`;
        depthEl.textContent = dot.depth;
        body.appendChild(depthEl);

        const exprEl = document.createElement('p');
        exprEl.className = 'ann-item-expr';
        exprEl.textContent = EXPRESSIONS[dot.expressionIndex] || `Expression ${dot.expressionIndex + 1}`;
        body.appendChild(exprEl);

        if (dot.dosage) {
          const dosageEl = document.createElement('p');
          dosageEl.className = 'ann-item-dosage';
          dosageEl.textContent = dot.dosage;
          body.appendChild(dosageEl);
        }

        if (dot.note) {
          const noteEl = document.createElement('p');
          noteEl.className = 'ann-item-note';
          noteEl.textContent = `"${dot.note}"`;
          body.appendChild(noteEl);
        }

        li.appendChild(dotEl);
        li.appendChild(body);
        list.appendChild(li);
      });
    }

    // ── Expert notes: any dot with free-text note gets an entry ──
    function buildNotes() {
      const noteDots = dots.filter(d => d.note);
      if (noteDots.length === 0) return;

      document.getElementById('notes-section').hidden = false;
      const box = document.getElementById('notes-box');
      noteDots.forEach(dot => {
        const label = document.createElement('p');
        label.innerHTML =
          `<span class="notes-point-label">Point ${dot.id} · ${EXPRESSIONS[dot.expressionIndex] || ''}</span><br>${dot.note}`;
        box.appendChild(label);
      });
    }
  </script>
</body>
</html>
