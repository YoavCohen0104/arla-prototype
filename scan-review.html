<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Review — Arla Aesthetics</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--color-text-muted);
      text-decoration: none;
      margin-bottom: 20px;
    }
    .back-link:hover { color: var(--color-rose); }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-bottom: 10px;
    }

    /* Full-session video player */
    .review-video {
      width: 100%;
      border-radius: var(--radius);
      background: #1a1a1a;
      display: block;
      max-height: 300px;
      object-fit: contain;
    }

    /* Shown when no video blob URL is available */
    .no-video-note {
      font-size: 13px;
      font-style: italic;
      color: var(--color-text-muted);
      padding: 14px 0 2px;
    }

    /* Divider between video and grid sections */
    .section-divider {
      margin: 24px 0;
    }

    /* 2-column × 4-row grid for 7 expression thumbnails */
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .thumb-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .thumb-frame {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border-radius: 8px;
      background: var(--color-border);
      display: block;
    }

    .thumb-label {
      font-size: 11px;
      color: var(--color-text-muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.3;
    }

    /* Retake button — submit mode only, shown below each thumbnail label */
    .retake-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--color-rose-light);
      background: transparent;
      color: var(--color-rose);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      margin-top: 2px;
    }
    .retake-btn:hover {
      background: var(--color-rose);
      color: #fff;
    }

    /* Empty state — shown when no arla_capture data exists */
    .empty-state {
      text-align: center;
      padding: 32px 0 8px;
    }

    .empty-state p {
      font-size: 15px;
      color: var(--color-text-muted);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card" id="mainCard">
    <a href="patient-folder.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M9 11L5 7l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to patient
    </a>

    <p class="brand">Arla Aesthetics</p>
    <h1 id="scanTitle">Scan Review</h1>

    <!-- Content injected by JS below -->
  </div>

  <script>
    const EXPRESSIONS = [
      'Neutral / Serious',
      'Raised Eyebrows',
      'Frown',
      'Smile',
      'Sad',
      'Left Side (90°)',
      'Right Side (90°)',
    ];

    // ── Mode detection ──
    const mode     = sessionStorage.getItem('arla_scan_mode') || 'review';
    const isSubmit = mode === 'submit';

    const card = document.getElementById('mainCard');
    const raw  = sessionStorage.getItem('arla_capture');

    // Title and back-link visibility depend on mode
    document.getElementById('scanTitle').textContent = isSubmit ? 'Review Captures' : 'Scan Review';
    document.querySelector('.back-link').hidden = isSubmit;

    if (!raw) {
      // ── Empty state ──
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML =
        '<p>No scan data available.</p>' +
        '<a href="patient-folder.html" class="btn btn-secondary" ' +
        'style="display:inline-block;text-decoration:none;">Back to patient</a>';
      card.appendChild(empty);
    } else {
      const { snapshots = [], videoUrl } = JSON.parse(raw);

      // ── Video section ──
      const videoLabel = document.createElement('p');
      videoLabel.className = 'section-label';
      videoLabel.textContent = 'Full Session Recording';
      card.appendChild(videoLabel);

      if (videoUrl) {
        const vid = document.createElement('video');
        vid.className = 'review-video';
        vid.src       = videoUrl;
        vid.controls  = true;
        card.appendChild(vid);
      } else {
        const note = document.createElement('p');
        note.className   = 'no-video-note';
        note.textContent = 'Video submitted with case';
        card.appendChild(note);
      }

      // ── Divider ──
      const hr = document.createElement('hr');
      hr.className = 'divider section-divider';
      card.appendChild(hr);

      // ── Expression thumbnails ──
      const gridLabel = document.createElement('p');
      gridLabel.className = 'section-label';
      gridLabel.textContent = 'Captured Expressions';
      card.appendChild(gridLabel);

      const grid = document.createElement('div');
      grid.className = 'thumb-grid';

      EXPRESSIONS.forEach((label, i) => {
        const item = document.createElement('div');
        item.className = 'thumb-item';

        const img = document.createElement('img');
        img.className = 'thumb-frame';
        img.alt = label;
        img.src = snapshots[i] || '';

        const span = document.createElement('span');
        span.className   = 'thumb-label';
        span.textContent = label;

        item.append(img, span);

        // Retake button — submit mode only; stores the expression index and goes back to capture.
        if (isSubmit) {
          const btn = document.createElement('button');
          btn.className   = 'retake-btn';
          btn.textContent = 'Retake';
          btn.addEventListener('click', () => {
            sessionStorage.setItem('arla_retake_index', String(i));
            window.location.href = 'facial-capture.html';
          });
          item.appendChild(btn);
        }

        grid.appendChild(item);
      });

      card.appendChild(grid);

      // ── Submit Case button — submit mode only ──
      if (isSubmit) {
        const submitBtn = document.createElement('button');
        submitBtn.className   = 'btn btn-primary';
        submitBtn.textContent = 'Submit Case';
        submitBtn.style.marginTop = '24px';
        submitBtn.addEventListener('click', () => {
          window.location.href = 'case-submitted.html';
        });
        card.appendChild(submitBtn);
      }
    }
  </script>
</body>
</html>
